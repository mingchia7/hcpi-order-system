<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HCPI 訂單進度系統｜弘丞精密工業</title>
<script src="https://accounts.google.com/gsi/client"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --brand:#5B21F4;--brand-dark:#4318C4;--brand-light:#EDE9FD;
  --gray-50:#F9F9F9;--gray-100:#F1F1F1;--gray-200:#E2E2E2;
  --gray-400:#A0A0A0;--gray-600:#5A5A5A;--gray-800:#222222;--white:#FFFFFF;
  --success:#3B6D11;--success-bg:#EAF3DE;--warning:#854F0B;--warning-bg:#FAEEDA;
  --info:#185FA5;--info-bg:#E6F1FB;--purple:#534AB7;--purple-bg:#EEEDFE;
  --danger:#A32D2D;--danger-bg:#FCEBEB;--radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh;}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-card{background:var(--white);border-radius:16px;border:1px solid var(--gray-200);padding:3rem 2.5rem;max-width:400px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(91,33,244,0.08);}
.login-company{font-size:13px;color:var(--gray-400);margin-bottom:4px;}
.login-title{font-size:22px;font-weight:600;color:var(--gray-800);margin-bottom:.5rem;}
.login-sub{font-size:14px;color:var(--gray-600);margin-bottom:2rem;line-height:1.6;}
.login-divider{border:none;border-top:1px solid var(--gray-200);margin:1.5rem 0;}
.login-note{font-size:12px;color:var(--gray-400);margin-top:1.25rem;line-height:1.6;}
#g_id_signin{display:flex;justify-content:center;}
#denied-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;}
.denied-icon{font-size:48px;margin-bottom:1rem;}
.denied-title{font-size:20px;font-weight:600;color:var(--gray-800);margin-bottom:.5rem;}
.denied-sub{font-size:14px;color:var(--gray-600);margin-bottom:1.5rem;}
.btn-signout{font-size:13px;padding:8px 20px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--white);color:var(--gray-600);cursor:pointer;}
#app{display:none;}
.topbar{background:var(--white);border-bottom:1px solid var(--gray-200);padding:0 1.5rem;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.topbar-name{font-size:15px;font-weight:600;color:var(--gray-800);flex:1;}
.topbar-name span{font-weight:400;color:var(--gray-400);font-size:13px;margin-left:6px;}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--brand-light);border:2px solid var(--brand);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--brand);cursor:pointer;overflow:hidden;flex-shrink:0;}
.user-avatar img{width:100%;height:100%;object-fit:cover;}
.main{max-width:960px;margin:0 auto;padding:1.5rem;}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem;}
.stat{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:.875rem 1rem;}
.stat-label{font-size:12px;color:var(--gray-400);margin-bottom:4px;}
.stat-num{font-size:24px;font-weight:600;color:var(--gray-800);}
.stat-num.c-brand{color:var(--brand);}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
.chip{font-size:13px;padding:5px 14px;border-radius:99px;border:1px solid var(--gray-200);background:transparent;color:var(--gray-600);cursor:pointer;transition:all .12s;white-space:nowrap;}
.chip:hover{background:var(--gray-100);}
.chip.active{background:var(--brand);color:var(--white);border-color:var(--brand);}
.btn-add{margin-left:auto;font-size:13px;padding:7px 18px;border-radius:var(--radius-sm);border:none;background:var(--brand);color:var(--white);cursor:pointer;font-weight:500;white-space:nowrap;}
.btn-add:hover{background:var(--brand-dark);}
.client-group{margin-bottom:1.5rem;}
.client-group-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:6px 12px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;}
.client-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.orders{display:flex;flex-direction:column;gap:8px;}
.order-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;transition:border-color .12s,box-shadow .12s;}
.order-card:hover{border-color:#C4B5FD;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
.order-card.expanded{border-color:var(--brand);}
.order-top{display:flex;align-items:center;gap:10px;padding:.875rem 1.25rem;cursor:pointer;flex-wrap:wrap;}
.order-id{font-size:13px;font-weight:600;color:var(--gray-800);min-width:100px;}
.order-name{font-size:13px;color:var(--gray-600);flex:1;min-width:80px;}
.order-qty-tag{font-size:12px;color:var(--gray-400);background:var(--gray-100);padding:2px 8px;border-radius:99px;white-space:nowrap;}
.badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500;white-space:nowrap;}
.b-wait{background:var(--gray-100);color:var(--gray-600);}
.b-mat{background:var(--info-bg);color:var(--info);}
.b-prod{background:var(--warning-bg);color:var(--warning);}
.b-proddone{background:#FFF3E0;color:#E65100;}
.b-qc{background:var(--purple-bg);color:var(--purple);}
.b-done{background:var(--success-bg);color:var(--success);}
.due-tag{font-size:12px;color:var(--gray-400);white-space:nowrap;}
.due-tag.overdue{color:var(--danger);font-weight:600;}
.prog-bar{height:3px;background:var(--gray-100);}
.prog-fill{height:100%;transition:width .4s;}
.order-detail{display:none;padding:1rem 1.25rem 1.25rem;border-top:1px solid var(--gray-100);}
.order-detail.open{display:block;}
.steps{display:flex;flex-direction:column;gap:0;margin-bottom:1rem;}
.step{display:flex;gap:12px;padding:7px 0;position:relative;}
.step-line{position:absolute;left:9px;top:22px;bottom:-7px;width:1px;background:var(--gray-200);}
.step:last-child .step-line{display:none;}
.step-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--gray-200);background:var(--white);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;z-index:1;}
.step-dot.done{background:var(--success);border-color:var(--success);}
.step-dot.active{background:var(--brand);border-color:var(--brand);}
.step-dot svg{width:10px;height:10px;}
.step-label{font-size:13px;font-weight:500;color:var(--gray-800);}
.step-meta{font-size:12px;color:var(--gray-400);margin-top:2px;}
.step-inputs{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;align-items:center;}
.step-input{font-size:12px;padding:4px 8px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--gray-50);color:var(--gray-800);}
.qty-input{width:80px;}
.stage-btns{display:flex;gap:6px;flex-wrap:wrap;padding-top:.75rem;border-top:1px solid var(--gray-100);}
.stage-btn{font-size:12px;padding:4px 12px;border-radius:99px;border:1px solid var(--gray-200);background:transparent;color:var(--gray-600);cursor:pointer;transition:all .12s;}
.stage-btn.active{background:var(--brand);color:var(--white);border-color:var(--brand);}
.stage-btn:hover:not(.active){background:var(--gray-100);}
.prod-form{background:var(--gray-50);border-radius:var(--radius-sm);padding:10px;margin-top:8px;}
.prod-form-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px;}
.prod-form-row label{color:var(--gray-600);min-width:70px;}
.prod-form-row select,.prod-form-row input[type=text],.prod-form-row input[type=number]{font-size:13px;padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--white);color:var(--gray-800);}
.btn-save-prod{font-size:12px;padding:5px 14px;border-radius:var(--radius-sm);border:none;background:var(--brand);color:var(--white);cursor:pointer;font-weight:500;}
.ship-section{margin-top:10px;border-top:1px solid var(--gray-100);padding-top:10px;}
.ship-title{font-size:13px;font-weight:500;color:var(--gray-800);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.ship-progress{font-size:12px;color:var(--gray-400);}
.ship-progress.complete{color:var(--success);font-weight:600;}
.ship-log{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.ship-log-item{display:flex;align-items:center;gap:8px;font-size:12px;background:var(--gray-50);border-radius:var(--radius-sm);padding:5px 10px;}
.ship-log-date{color:var(--gray-600);min-width:90px;}
.ship-log-qty{font-weight:600;color:var(--success);}
.ship-add-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.ship-add-row input{font-size:13px;padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--white);color:var(--gray-800);}
.btn-ship{font-size:12px;padding:5px 14px;border-radius:var(--radius-sm);border:none;background:var(--success);color:var(--white);cursor:pointer;font-weight:500;}
.ship-bar{height:6px;background:var(--gray-200);border-radius:99px;margin-bottom:8px;overflow:hidden;}
.ship-bar-fill{height:100%;background:var(--success);border-radius:99px;transition:width .4s;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.modal-bg.open{display:flex;}
.modal{background:var(--white);border-radius:14px;padding:1.75rem;width:min(480px,100%);max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:1.25rem;color:var(--gray-800);}
.form-row{margin-bottom:.875rem;}
.form-label{font-size:13px;color:var(--gray-600);margin-bottom:4px;display:block;}
.form-input{width:100%;font-size:14px;padding:9px 11px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--gray-50);color:var(--gray-800);}
.form-input:focus{outline:none;border-color:var(--brand);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}
.btn-cancel{font-size:13px;padding:8px 18px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:transparent;color:var(--gray-600);cursor:pointer;}
.btn-save{font-size:13px;padding:8px 18px;border-radius:var(--radius-sm);border:none;background:var(--brand);color:var(--white);cursor:pointer;font-weight:500;}
.btn-save:hover{background:var(--brand-dark);}
.tab-btn{font-size:12px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:transparent;color:var(--gray-600);cursor:pointer;transition:all .12s;white-space:nowrap;}
.tab-btn.active{background:var(--brand);color:var(--white);border-color:var(--brand);}
.tab-btn:hover:not(.active){background:var(--gray-100);}
#report-table td{padding:9px 14px;border-bottom:1px solid var(--gray-100);color:var(--gray-800);}
#report-table tr:last-child td{border-bottom:none;}
#report-table tr:hover td{background:var(--gray-50);}
.report-empty{padding:3rem;text-align:center;color:var(--gray-400);font-size:14px;}
.empty{padding:3rem;text-align:center;color:var(--gray-400);font-size:14px;}
.qr-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:1rem;text-align:center;page-break-inside:avoid;}
.qr-factory{font-size:11px;color:var(--gray-400);margin-bottom:2px;}
.qr-machine{font-size:16px;font-weight:700;color:var(--gray-800);margin-bottom:10px;}
.qr-img{width:140px;height:140px;margin:0 auto;}
.dash-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:1.25rem;}
.dash-card-title{font-size:14px;font-weight:600;color:var(--gray-800);margin-bottom:1rem;}
.po-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;margin-bottom:8px;transition:border-color .12s;}
.po-card:hover{border-color:#C4B5FD;}
.po-card.expanded{border-color:var(--brand);}
.po-top{display:flex;align-items:center;gap:10px;padding:.875rem 1.25rem;cursor:pointer;flex-wrap:wrap;}
.po-detail{display:none;padding:1rem 1.25rem 1.25rem;border-top:1px solid var(--gray-100);}
.po-detail.open{display:block;}
.vendor-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:1rem;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.alert-card{background:var(--warning-bg);border:1px solid #F6C05A;border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
@media print{.topbar,.toolbar,.btn-add,#page-orders,#page-report,.modal-bg{display:none!important;}#page-qr{display:block!important;}#qr-grid{grid-template-columns:repeat(4,1fr);}}
@media(max-width:520px){.stats{grid-template-columns:repeat(2,minmax(0,1fr));}.order-name{display:none;}.topbar-name span{display:none;}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div style="margin-bottom:1.25rem;"><img src="https://raw.githubusercontent.com/mingchia7/hcpi-order-system/main/logo.png" style="width:120px;height:80px;object-fit:contain;" /></div>
    <div class="login-company">弘丞精密工業有限公司</div>
    <div class="login-title">HCPI 訂單系統</div>
    <div class="login-sub">僅限公司人員登入使用<br>請使用公司授權的 Google 帳號</div>
    <hr class="login-divider" />
    <div id="g_id_signin"></div>
    <div class="login-note">如無法登入，請聯繫管理員確認<br>您的帳號是否已取得存取權限</div>
  </div>
</div>

<div id="denied-screen">
  <div class="denied-icon">🔒</div>
  <div class="denied-title">無存取權限</div>
  <div class="denied-sub" id="denied-email"></div>
  <button class="btn-signout" onclick="signOut()">登出，換帳號試試</button>
</div>

<div id="app">
  <div class="topbar">
    <div style="width:36px;height:36px;flex-shrink:0;"><img src="https://raw.githubusercontent.com/mingchia7/hcpi-order-system/main/logo.png" style="width:36px;height:36px;object-fit:contain;" /></div>
    <div class="topbar-name">HCPI <span>訂單進度系統</span></div>
    <div style="display:flex;gap:5px;margin-right:8px;flex-wrap:wrap;">
      <button id="tab-orders" class="tab-btn active" onclick="switchTab('orders')">📋 訂單</button>
      <button id="tab-report" class="tab-btn" onclick="switchTab('report')">📊 日報表</button>
      <button id="tab-qr" class="tab-btn" onclick="switchTab('qr')">QR Code</button>
      <button id="tab-dashboard" class="tab-btn" onclick="switchTab('dashboard')">📈 儀表板</button>
      <button id="tab-purchase" class="tab-btn" onclick="switchTab('purchase')">🛒 採購</button>
    </div>
    <div class="user-avatar" id="user-avatar" title="登出" onclick="signOut()"></div>
  </div>

  <!-- 訂單管理 -->
  <div class="main" id="page-orders">
    <div class="stats" id="stats"></div>
    <div class="toolbar">
      <button class="chip active" onclick="setFilter('all',this)">全部</button>
      <button class="chip" onclick="setFilter('待入料',this)">待入料</button>
      <button class="chip" onclick="setFilter('入料中',this)">入料中</button>
      <button class="chip" onclick="setFilter('生產中',this)">生產中</button>
      <button class="chip" onclick="setFilter('生產完成',this)">生產完成</button>
      <button class="chip" onclick="setFilter('品檢中',this)">品檢中</button>
      <button class="chip" onclick="setFilter('完成',this)">完成</button>
      <button class="btn-add" onclick="openModal('order')">+ 新增訂單</button>
    </div>
    <div id="orders-container"></div>
  </div>

  <!-- QR Code -->
  <div class="main" id="page-qr" style="display:none;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;">
      <div style="font-size:16px;font-weight:600;">機台 QR Code</div>
      <button onclick="window.print()" style="font-size:13px;padding:7px 16px;border-radius:var(--radius-sm);border:none;background:var(--brand);color:var(--white);cursor:pointer;font-weight:500;margin-left:auto;">列印全部</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;" id="qr-grid"></div>
  </div>

  <!-- 生產日報表 -->
  <div class="main" id="page-report" style="display:none;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;flex-wrap:wrap;">
      <div style="font-size:16px;font-weight:600;">生產日報表</div>
      <input type="date" id="report-date" style="font-size:14px;padding:7px 11px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--white);" onchange="renderReport()" />
      <button onclick="goToday()" style="font-size:13px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:transparent;color:var(--gray-600);cursor:pointer;">今天</button>
      <button onclick="exportExcel()" style="font-size:13px;padding:7px 16px;border-radius:var(--radius-sm);border:none;background:var(--success);color:var(--white);cursor:pointer;font-weight:500;margin-left:auto;">匯出 Excel</button>
    </div>
    <div id="report-summary" style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;"></div>
    <div style="background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;margin-top:1rem;">
      <table id="report-table" style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead>
          <tr style="background:var(--gray-50);border-bottom:1px solid var(--gray-200);">
            <th style="padding:10px 14px;text-align:left;font-weight:500;color:var(--gray-600);">日期</th>
            <th style="padding:10px 14px;text-align:left;font-weight:500;color:var(--gray-600);">廠別</th>
            <th style="padding:10px 14px;text-align:left;font-weight:500;color:var(--gray-600);">機台</th>
            <th style="padding:10px 14px;text-align:left;font-weight:500;color:var(--gray-600);">工段</th>
            <th style="padding:10px 14px;text-align:left;font-weight:500;color:var(--gray-600);">品名</th>
            <th style="padding:10px 14px;text-align:left;font-weight:500;color:var(--gray-600);">生產時間</th>
            <th style="padding:10px 14px;text-align:left;font-weight:500;color:var(--gray-600);">訂單編號</th>
            <th style="padding:10px 14px;text-align:right;font-weight:500;color:var(--gray-600);">生產數量</th>
            <th style="padding:10px 14px;text-align:left;font-weight:500;color:var(--gray-600);">操作員</th>
          </tr>
        </thead>
        <tbody id="report-body"></tbody>
      </table>
    </div>
  </div>

  <!-- 儀表板 -->
  <div class="main" id="page-dashboard" style="display:none;">
    <div style="font-size:16px;font-weight:600;margin-bottom:1.25rem;">📈 數據分析儀表板</div>
    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem;" id="dash-stats"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1.25rem;">
      <div class="dash-card"><div class="dash-card-title">📈 近7天生產趨勢</div><canvas id="chart-trend"></canvas></div>
      <div class="dash-card"><div class="dash-card-title">🏭 各廠別產能佔比</div><canvas id="chart-factory"></canvas></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1.25rem;">
      <div class="dash-card"><div class="dash-card-title">📦 訂單狀態分佈</div><canvas id="chart-orders"></canvas></div>
      <div class="dash-card"><div class="dash-card-title">👷 操作員產能 Top 10</div><canvas id="chart-operators"></canvas></div>
    </div>
    <div class="dash-card" style="margin-bottom:1.25rem;"><div class="dash-card-title">🔩 品名產能排行</div><canvas id="chart-products"></canvas></div>
    <div class="dash-card"><div class="dash-card-title" style="color:var(--danger);">🚨 逾期訂單警告</div><div id="dash-overdue"></div></div>
  </div>

  <!-- 採購管理 -->
  <div class="main" id="page-purchase" style="display:none;">
    <div style="font-size:16px;font-weight:600;margin-bottom:1.25rem;">🛒 採購管理</div>
    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem;" id="po-stats"></div>
    <div id="po-alerts" style="margin-bottom:1.25rem;"></div>

const ALL_MACHINES=[...Array.from({length:22},(_,i)=>({factory:'一廠',machine:`CNC車${i+1}`})),...Array.from({length:14},(_,i)=>({factory:'二廠',machine:`CNC銑${i+1}`})),...Array.from({length:16},(_,i)=>({factory:'二廠',machine:`CNC車${i+1}`}))];

function goToday(){document.getElementById('report-date').value=new Date().toISOString().split('T')[0];renderReport();}
function renderReport(){
  const date=document.getElementById('report-date').value;if(!date)return;
  const rows=[];
  orders.forEach(o=>{(Array.isArray(o.prodLogs)?o.prodLogs:[]).forEach(l=>{if(l.date===date)rows.push({...l,orderId:o.id,orderName:o.name,productName:l.productName||o.name||'-'});});});
  db.collection('prodReports').where('date','==',date).get().then(snapshot=>{
    snapshot.forEach(doc=>{const d=doc.data();rows.push({date:d.date,loc:d.factory,machine:d.machine,section:d.section,operator:d.operator,qty:d.qty,orderId:'-',orderName:'-',productName:d.productName||'-'});});
    renderReportTable(rows,date);
  }).catch(()=>renderReportTable(rows,date));
}
function renderReportTable(rows,date){
  const totalQty=rows.reduce((s,r)=>s+parseInt(r.qty||0),0);
  const f1=rows.filter(r=>r.loc==='一廠').reduce((s,r)=>s+parseInt(r.qty||0),0);
  const f2=rows.filter(r=>r.loc==='二廠').reduce((s,r)=>s+parseInt(r.qty||0),0);
  const f3=rows.filter(r=>r.loc==='委外加工').reduce((s,r)=>s+parseInt(r.qty||0),0);
  const productMap={};
  rows.forEach(r=>{const name=r.productName||r.orderName||'-';const factory=r.loc||r.factory||'-';if(!productMap[name])productMap[name]={total:0,sections:{}};const qty=parseInt(r.qty||0);productMap[name].total+=qty;const key=factory+'・'+(r.section||'未填工段');if(!productMap[name].sections[key])productMap[name].sections[key]={qty:0,factory};productMap[name].sections[key].qty+=qty;});
  const factoryColor={'一廠':'#5B21F4','二廠':'#1D4ED8','委外加工':'#B45309'};
  const productCards=Object.entries(productMap).map(([name,data])=>{
    const sectionRows=Object.entries(data.sections).sort((a,b)=>b[1].qty-a[1].qty).map(([key,val])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--gray-100);"><span style="font-size:12px;color:${factoryColor[val.factory]||'var(--gray-600)'};">${key}</span><span style="font-size:12px;font-weight:600;">${val.qty} pcs</span></div>`).join('');
    return `<div style="background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:.875rem 1rem;min-width:200px;flex:1;"><div style="font-size:13px;font-weight:600;margin-bottom:4px;">${name}</div><div style="font-size:22px;font-weight:600;color:var(--brand);margin-bottom:8px;">${data.total} pcs</div><div>${sectionRows}</div></div>`;
  }).join('');
  document.getElementById('report-summary').innerHTML=[`<div class="stat"><div class="stat-label">當日生產總量</div><div class="stat-num">${totalQty} pcs</div></div>`,`<div class="stat"><div class="stat-label">一廠</div><div class="stat-num c-brand">${f1} pcs</div></div>`,`<div class="stat"><div class="stat-label">二廠</div><div class="stat-num" style="color:#1D4ED8;">${f2} pcs</div></div>`,`<div class="stat"><div class="stat-label">委外加工</div><div class="stat-num" style="color:#B45309;">${f3} pcs</div></div>`].join('');
  let pse=document.getElementById('product-summary');
  if(!pse){pse=document.createElement('div');pse.id='product-summary';document.getElementById('report-summary').after(pse);}
  pse.innerHTML=Object.keys(productMap).length?`<div style="font-size:13px;font-weight:500;color:var(--gray-600);margin-bottom:8px;margin-top:1rem;">品名當日生產彙總</div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem;">${productCards}</div>`:'';
  const tbody=document.getElementById('report-body');
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="9" class="report-empty">此日期無生產紀錄</td></tr>`;return;}
  const factories=['一廠','二廠','委外加工'];
  const factoryColors={'一廠':{bg:'#F3F0FF',border:'#7C3AED',label:'#5B21F4'},'二廠':{bg:'#EFF6FF',border:'#3B82F6',label:'#1D4ED8'},'委外加工':{bg:'#FFF7ED',border:'#F59E0B',label:'#B45309'}};
  let html='';
  factories.forEach(factory=>{
    const fr=rows.filter(r=>(r.loc||r.factory)===factory);if(!fr.length)return;
    const fc=factoryColors[factory];const ft=fr.reduce((s,r)=>s+parseInt(r.qty||0),0);
    html+=`<tr><td colspan="9" style="padding:8px 14px;background:${fc.bg};border-left:4px solid ${fc.border};font-size:13px;font-weight:600;color:${fc.label};">${factory} &nbsp;・&nbsp; <span style="font-weight:400;">共 ${fr.length} 筆 ・ ${ft} pcs</span></td></tr>`;
    html+=fr.map(r=>`<tr style="border-left:4px solid ${fc.border}20;"><td>${r.date}</td><td><span style="font-size:12px;font-weight:500;color:${fc.label};">${r.loc||r.factory||'-'}</span></td><td>${r.machine||'-'}</td><td>${r.section?`<span style="font-size:12px;background:var(--purple-bg);color:var(--purple);padding:1px 7px;border-radius:99px;">${r.section}</span>`:'-'}</td><td style="font-weight:500;">${r.productName||r.orderName||'-'}</td><td style="font-size:12px;color:var(--gray-600);">${r.startTime&&r.endTime?`${r.startTime}～${r.endTime}`:r.startTime||'-'}</td><td style="color:var(--gray-600);">${r.orderId||'-'}</td><td style="text-align:right;font-weight:600;color:var(--success);">${r.qty||0} pcs</td><td>${r.operator||'-'}</td></tr>`).join('');
  });
  tbody.innerHTML=html;
}
function exportExcel(){

async function renderDashboard(){
  const now=new Date();const todayTW=new Date(now.getTime()+8*60*60*1000).toISOString().split('T')[0];
  const allLogs=[];
  orders.forEach(o=>{(Array.isArray(o.prodLogs)?o.prodLogs:[]).forEach(l=>{allLogs.push({...l,orderId:o.id,orderName:o.name,productName:l.productName||o.name});});});
  try{const snap=await db.collection('prodReports').get();snap.forEach(doc=>{const d=doc.data();allLogs.push({date:d.date,loc:d.factory,machine:d.machine,section:d.section,operator:d.operator,qty:d.qty,productName:d.productName,orderId:'-'});});}catch(e){}
  const totalProd=allLogs.reduce((s,l)=>s+parseInt(l.qty||0),0);
  const todayProd=allLogs.filter(l=>l.date===todayTW).reduce((s,l)=>s+parseInt(l.qty||0),0);
  const activeOrders=orders.filter(o=>o.stage!=='完成').length;
  const overdueOrders=orders.filter(o=>o.stage!=='完成'&&new Date(o.due)<now).length;
  document.getElementById('dash-stats').innerHTML=[['今日產量',todayProd.toLocaleString()+' pcs','var(--brand)'],['累計總產量',totalProd.toLocaleString()+' pcs','var(--success)'],['進行中訂單',activeOrders+' 張','var(--info)'],['逾期訂單',overdueOrders+' 張',overdueOrders>0?'var(--danger)':'var(--gray-400)']].map(([l,n,c])=>`<div class="stat"><div class="stat-label">${l}</div><div class="stat-num" style="color:${c};font-size:20px;">${n}</div></div>`).join('');
  const days=Array.from({length:7},(_,i)=>{const d=new Date(now.getTime()+8*60*60*1000-(6-i)*86400000);return d.toISOString().split('T')[0];});
  const trendData=days.map(d=>allLogs.filter(l=>l.date===d).reduce((s,l)=>s+parseInt(l.qty||0),0));
  if(chartTrend)chartTrend.destroy();
  chartTrend=new Chart(document.getElementById('chart-trend'),{type:'line',data:{labels:days.map(d=>d.slice(5)),datasets:[{label:'生產數量',data:trendData,borderColor:'#5B21F4',backgroundColor:'rgba(91,33,244,0.1)',fill:true,tension:0.4,pointBackgroundColor:'#5B21F4',pointRadius:5}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
  const factories=['一廠','二廠','委外加工'];
  const factoryQty=factories.map(f=>allLogs.filter(l=>l.loc===f||l.factory===f).reduce((s,l)=>s+parseInt(l.qty||0),0));
  if(chartFactory)chartFactory.destroy();

  const totalAmount=purchaseOrders.filter(p=>p.status!=='已取消').reduce((s,p)=>s+(parseInt(p.qty||0)*parseFloat(p.price||0)),0);
  document.getElementById('po-stats').innerHTML=[['採購單總數',total+' 張','var(--gray-800)'],['待確認',pending+' 張',pending>0?'var(--warning)':'var(--gray-400)'],['進行中',inProgress+' 張','var(--info)'],['採購總金額','NT$ '+totalAmount.toLocaleString(),'var(--brand)']].map(([l,n,c])=>`<div class="stat"><div class="stat-label">${l}</div><div class="stat-num" style="color:${c};font-size:18px;">${n}</div></div>`).join('');

function initGoogleLogin(){if(typeof google==='undefined'){setTimeout(initGoogleLogin,300);return;}google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleCredential,auto_select:false,ux_mode:'popup'});google.accounts.id.renderButton(document.getElementById('g_id_signin'),{theme:'outline',size:'large',text:'signin_with',locale:'zh-TW',width:280});google.accounts.id.prompt();}
window.addEventListener('load',initGoogleLogin);
function handleCredential(response){const payload=parseJwt(response.credential);if(ALLOWED_EMAILS.includes(payload.email)){showApp(payload);}else{document.getElementById('denied-email').textContent=payload.email+' 無權限存取此系統';document.getElementById('login-screen').style.display='none';document.getElementById('denied-screen').style.display='flex';}}
function showApp(payload){document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';currentUser=payload.name||payload.email.split('@')[0];const av=document.getElementById('user-avatar');if(payload.picture)av.innerHTML=`<img src="${payload.picture}" alt="avatar" />`;else av.textContent=(payload.name||payload.email)[0].toUpperCase();document.getElementById('report-date').value=new Date().toISOString().split('T')[0];loadOrders();loadPurchaseData();}
function signOut(){google.accounts.id.disableAutoSelect();location.reload();}
function parseJwt(token){const base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');return JSON.parse(decodeURIComponent(atob(base64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));}

function renderOrderCard(o){
  const over=o.stage!=='完成'&&new Date(o.due)<new Date();const pct=PROG[o.stage]||0;const isExp=expanded===o.id;
  const total=parseInt(o.totalQty)||0;const logs=Array.isArray(o.shipLogs)?o.shipLogs:[];
  const shipped=logs.reduce((s,l)=>s+parseInt(l.qty||0),0);const defects=logs.reduce((s,l)=>s+parseInt(l.defect||0),0);
  const steps=[{key:'mat',label:'入料到廠',activeStage:'入料中',hasQty:true,qtyKey:'matQty',qtyLabel:'入料數量'},{key:'prodStart',label:'生產開始',activeStage:'生產中',hasQty:false},{key:'prod',label:'生產完成',activeStage:'生產完成',hasQty:false},{key:'qc',label:'品檢通過',activeStage:'品檢中',hasQty:false}];
  const stepsHtml=steps.map(s=>{const done=o[s.key]&&o[s.key]!=='';const active=!done&&o.stage===s.activeStage;return `<div class="step"><div class="step-dot ${done?'done':active?'active':''}">${done?`<svg viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}</div><div class="step-line"></div><div style="flex:1;"><div class="step-label">${s.label}</div>${done?`<div class="step-meta">完成於 ${o[s.key]}${s.hasQty&&o[s.qtyKey]?' ・ '+o[s.qtyKey]+' pcs':''}</div>`:`<div class="step-inputs"><input class="step-input" type="date" onchange="updateStep('${o.id}','${s.key}',this.value)" />${s.hasQty?`<input class="step-input qty-input" type="number" min="0" placeholder="${s.qtyLabel}" onchange="updateStep('${o.id}','${s.qtyKey}',this.value)" /><span style="font-size:12px;color:var(--gray-400);">pcs</span>`:''}</div>`}</div></div>`;}).join('');
  const prodLogs=Array.isArray(o.prodLogs)?o.prodLogs:[];
  const showProdSection=o.stage==='生產中'||o.stage==='生產完成'||prodLogs.length>0;
  const prodInfoHtml=showProdSection?`<div class="ship-section"><div class="ship-title">生產紀錄 <span style="font-size:12px;color:var(--gray-400);font-weight:400;">共 ${prodLogs.length} 筆</span></div>${prodLogs.length?`<div class="ship-log">${prodLogs.map((l,i)=>`<div class="ship-log-item" style="flex-wrap:wrap;gap:6px;"><span class="ship-log-date">${l.date}</span><span style="font-size:12px;font-weight:500;color:var(--brand);">${l.loc||l.factory||'-'}</span>${l.machine?`<span style="font-size:12px;color:var(--gray-600);">${l.machine}</span>`:''} ${(l.section||l.workSection)?`<span style="font-size:12px;background:var(--purple-bg);color:var(--purple);padding:1px 7px;border-radius:99px;">${l.section||l.workSection}</span>`:''} ${l.qty?`<span class="ship-log-qty">${l.qty} pcs</span>`:''} ${(l.operator||l.operatorName)?`<span style="font-size:12px;color:var(--gray-400);">操作員：${l.operator||l.operatorName}</span>`:''}<button onclick="deleteProdLog('${o.id}',${i})" style="margin-left:auto;font-size:11px;padding:2px 8px;border-radius:99px;border:1px solid var(--gray-200);background:transparent;color:var(--gray-400);cursor:pointer;">刪除</button></div>`).join('')}</div>`:''}
  <div class="prod-form" style="margin-top:8px;">
    <div class="prod-form-row"><label>日期：</label><input type="date" id="prodlog-date-${o.id}" style="font-size:13px;padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--white);" /></div>
    <div class="prod-form-row"><label>生產地點：</label><select id="prodlog-loc-${o.id}" onchange="updateProdLogLoc('${o.id}')"><option value="">請選擇</option><option value="一廠">一廠</option><option value="二廠">二廠</option><option value="委外加工">委外加工</option></select></div>
    <div id="prodlog-machine-row-${o.id}" style="display:none;" class="prod-form-row"><label>機台：</label><select id="prodlog-machine-${o.id}"><option value="">請選擇</option></select></div>
    <div id="prodlog-section-row-${o.id}" style="display:none;" class="prod-form-row"><label>工段：</label><select id="prodlog-section-${o.id}"><option value="">請選擇工段</option>${WORK_SECTIONS.map(s=>`<option value="${s}">${s}</option>`).join('')}</select></div>
    <div id="prodlog-vendor-row-${o.id}" style="display:none;" class="prod-form-row"><label>委外廠商：</label><input type="text" id="prodlog-vendor-${o.id}" placeholder="廠商名稱" style="font-size:13px;padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--white);" /></div>
    <div class="prod-form-row"><label>生產數量：</label><input type="number" id="prodlog-qty-${o.id}" placeholder="0" min="0" style="width:80px;font-size:13px;padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--white);" /><span style="font-size:12px;color:var(--gray-400);">pcs</span></div>
    <div class="prod-form-row"><label>操作員：</label><input type="text" id="prodlog-operator-${o.id}" placeholder="${currentUser}" value="${currentUser}" style="font-size:13px;padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--white);" /><button class="btn-save-prod" onclick="saveProdLog('${o.id}')">+ 新增生產</button></div>
  </div></div>`:'';
  let workDays='';if(o.prodStart&&o.prod){const d1=new Date(o.prodStart),d2=new Date(o.prod);const diff=Math.round((d2-d1)/(1000*60*60*24));if(diff>=0)workDays=diff;}
  const shipPct=total>0?Math.min(100,Math.round((shipped+defects)/total*100)):0;const shipDone=total>0&&(shipped+defects)>=total;
  const shipHtml=`<div class="ship-section"><div class="ship-title">出貨紀錄 <span class="ship-progress ${shipDone?'complete':''}">${total>0?`出貨 ${shipped} + 不良 ${defects} = ${shipped+defects} / ${total} pcs (${shipPct}%)`:'尚未設定總數量'}</span></div>${total>0?`<div class="ship-bar"><div class="ship-bar-fill" style="width:${shipPct}%;"></div></div>`:''}${logs.length?`<div class="ship-log">${logs.map((l,i)=>`<div class="ship-log-item"><span class="ship-log-date">${l.date}</span><span class="ship-log-qty">出貨 +${l.qty} pcs</span>${parseInt(l.defect||0)>0?`<span style="font-size:12px;color:var(--danger);font-weight:500;">不良 ${l.defect} pcs</span>`:''}<button onclick="deleteShipment('${o.id}',${i})" style="margin-left:auto;font-size:11px;padding:2px 8px;border-radius:99px;border:1px solid var(--gray-200);background:transparent;color:var(--gray-400);cursor:pointer;">刪除</button></div>`).join('')}</div>`:''}${shipDone?`<div style="background:var(--success-bg);border-radius:var(--radius-sm);padding:10px 14px;margin-top:8px;"><div style="font-size:13px;color:var(--success);font-weight:600;margin-bottom:4px;">✓ 已全數出貨完成</div><div style="display:flex;gap:20px;flex-wrap:wrap;"><div style="font-size:12px;color:var(--gray-600);">不良率：<strong style="color:${parseFloat(o.defectRate||0)>5?'var(--danger)':'var(--success)'};">${o.defectRate||'0'}%</strong></div>${workDays!==''?`<div style="font-size:12px;color:var(--gray-600);">生產工時：<strong style="color:var(--info);">${workDays} 天</strong></div>`:''}</div></div>`:`<div class="ship-add-row"><input type="date" id="ship-date-${o.id}" class="step-input" /><input type="number" id="ship-qty-${o.id}" class="step-input qty-input" min="1" placeholder="出貨數量" /><input type="number" id="ship-defect-${o.id}" class="step-input qty-input" min="0" placeholder="不良品" style="border-color:#FECACA;" /><span style="font-size:12px;color:var(--gray-400);">pcs</span><button class="btn-ship" onclick="addShipment('${o.id}')">+ 新增出貨</button></div>`}</div>`;
  return `<div class="order-card ${isExp?'expanded':''}"><div class="order-top" onclick="toggleExpand('${o.id}')"><span class="order-id">${o.id}</span><span class="order-name">${o.name}</span>${total>0?`<span class="order-qty-tag">${total} pcs</span>`:''}<span class="badge ${BADGE[o.stage]||'b-wait'}">${o.stage}</span><span class="due-tag ${over?'overdue':''}">${over?'⚠ ':''}交期 ${o.due}</span></div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${COLORS[o.stage]||'#B4B2A9'};"></div></div><div class="order-detail ${isExp?'open':''}"><div class="steps">${stepsHtml}</div>${prodInfoHtml}${shipHtml}<div class="stage-btns" style="margin-top:10px;">${STAGES.map(s=>`<button class="stage-btn ${o.stage===s?'active':''}" onclick="changeStage('${o.id}','${s}')">${s}</button>`).join('')}</div></div></div>`;
}

function toggleExpand(id){expanded=expanded===id?null:id;renderOrders();}
function setFilter(f,btn){filter=f;document.querySelectorAll('#page-orders .chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderOrders();}
</script>
</body>
</html>
