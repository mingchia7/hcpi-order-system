<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HCPI 訂單進度系統｜弘丞精密工業</title>
<script src="https://accounts.google.com/gsi/client"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --brand:#5B21F4;--brand-dark:#4318C4;--brand-light:#EDE9FD;
  --gray-50:#F9F9F9;--gray-100:#F1F1F1;--gray-200:#E2E2E2;
  --gray-400:#A0A0A0;--gray-600:#5A5A5A;--gray-800:#222222;--white:#FFFFFF;
  --success:#3B6D11;--success-bg:#EAF3DE;--warning:#854F0B;--warning-bg:#FAEEDA;
  --info:#185FA5;--info-bg:#E6F1FB;--purple:#534AB7;--purple-bg:#EEEDFE;
  --danger:#A32D2D;--danger-bg:#FCEBEB;--radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh;}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-card{background:var(--white);border-radius:16px;border:1px solid var(--gray-200);padding:3rem 2.5rem;max-width:400px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(91,33,244,0.08);}
.login-logo{display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;}
.login-company{font-size:13px;color:var(--gray-400);margin-bottom:4px;letter-spacing:.03em;}
.login-title{font-size:22px;font-weight:600;color:var(--gray-800);margin-bottom:.5rem;}
.login-sub{font-size:14px;color:var(--gray-600);margin-bottom:2rem;line-height:1.6;}
.login-divider{border:none;border-top:1px solid var(--gray-200);margin:1.5rem 0;}
.login-note{font-size:12px;color:var(--gray-400);margin-top:1.25rem;line-height:1.6;}
#g_id_signin{display:flex;justify-content:center;}
#denied-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;}
.denied-icon{font-size:48px;margin-bottom:1rem;}
.denied-title{font-size:20px;font-weight:600;color:var(--gray-800);margin-bottom:.5rem;}
.denied-sub{font-size:14px;color:var(--gray-600);margin-bottom:1.5rem;}
.btn-signout{font-size:13px;padding:8px 20px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--white);color:var(--gray-600);cursor:pointer;}
#app{display:none;}
.topbar{background:var(--white);border-bottom:1px solid var(--gray-200);padding:0 1.5rem;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.topbar-logo{width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.topbar-name{font-size:15px;font-weight:600;color:var(--gray-800);flex:1;}
.topbar-name span{font-weight:400;color:var(--gray-400);font-size:13px;margin-left:6px;}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--brand-light);border:2px solid var(--brand);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--brand);cursor:pointer;overflow:hidden;flex-shrink:0;}
.user-avatar img{width:100%;height:100%;object-fit:cover;}
.main{max-width:960px;margin:0 auto;padding:1.5rem;}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem;}
.stat{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:.875rem 1rem;}
.stat-label{font-size:12px;color:var(--gray-400);margin-bottom:4px;}
.stat-num{font-size:24px;font-weight:600;color:var(--gray-800);}
.stat-num.c-brand{color:var(--brand);}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
.chip{font-size:13px;padding:5px 14px;border-radius:99px;border:1px solid var(--gray-200);background:transparent;color:var(--gray-600);cursor:pointer;transition:all .12s;white-space:nowrap;}
.chip:hover{background:var(--gray-100);}
.chip.active{background:var(--brand);color:var(--white);border-color:var(--brand);}
.btn-add{margin-left:auto;font-size:13px;padding:7px 18px;border-radius:var(--radius-sm);border:none;background:var(--brand);color:var(--white);cursor:pointer;font-weight:500;white-space:nowrap;}
.btn-add:hover{background:var(--brand-dark);}
.client-group{margin-bottom:1.5rem;}
.client-group-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:6px 12px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;}
.client-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.orders{display:flex;flex-direction:column;gap:8px;}
.order-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;transition:border-color .12s,box-shadow .12s;}
.order-card:hover{border-color:#C4B5FD;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
.order-card.expanded{border-color:var(--brand);}
.order-top{display:flex;align-items:center;gap:10px;padding:.875rem 1.25rem;cursor:pointer;flex-wrap:wrap;}
.order-id{font-size:13px;font-weight:600;color:var(--gray-800);min-width:100px;}
.order-name{font-size:13px;color:var(--gray-600);flex:1;min-width:80px;}
.order-qty-tag{font-size:12px;color:var(--gray-400);background:var(--gray-100);padding:2px 8px;border-radius:99px;white-space:nowrap;}
.badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500;white-space:nowrap;}
.b-wait{background:var(--gray-100);color:var(--gray-600);}
.b-mat{background:var(--info-bg);color:var(--info);}
.b-prod{background:var(--warning-bg);color:var(--warning);}
.b-proddone{background:#FFF3E0;color:#E65100;}
.b-qc{background:var(--purple-bg);color:var(--purple);}
.b-done{background:var(--success-bg);color:var(--success);}
.due-tag{font-size:12px;color:var(--gray-400);white-space:nowrap;}
.due-tag.overdue{color:var(--danger);font-weight:600;}
.prog-bar{height:3px;background:var(--gray-100);}
.prog-fill{height:100%;transition:width .4s;}
.order-detail{display:none;padding:1rem 1.25rem 1.25rem;border-top:1px solid var(--gray-100);}
.order-detail.open{display:block;}
.steps{display:flex;flex-direction:column;gap:0;margin-bottom:1rem;}
.step{display:flex;gap:12px;padding:7px 0;position:relative;}
.step-line{position:absolute;left:9px;top:22px;bottom:-7px;width:1px;background:var(--gray-200);}
.step:last-child .step-line{display:none;}
.step-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--gray-200);background:var(--white);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;z-index:1;}
.step-dot.done{background:var(--success);border-color:var(--success);}
.step-dot.active{background:var(--brand);border-color:var(--brand);}
.step-dot svg{width:10px;height:10px;}
.step-label{font-size:13px;font-weight:500;color:var(--gray-800);}
.step-meta{font-size:12px;color:var(--gray-400);margin-top:2px;}
.step-inputs{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;align-items:center;}
.step-input{font-size:12px;padding:4px 8px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--gray-50);color:var(--gray-800);}
.qty-input{width:80px;}
.stage-btns{display:flex;gap:6px;flex-wrap:wrap;padding-top:.75rem;border-top:1px solid var(--gray-100);}
.stage-btn{font-size:12px;padding:4px 12px;border-radius:99px;border:1px solid var(--gray-200);background:transparent;color:var(--gray-600);cursor:pointer;transition:all .12s;}
.stage-btn.active{background:var(--brand);color:var(--white);border-color:var(--brand);}
.stage-btn:hover:not(.active){background:var(--gray-100);}
.prod-info{display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:var(--gray-50);border-radius:var(--radius-sm);padding:8px 10px;font-size:12px;margin-top:8px;}
.prod-info-label{color:var(--gray-400);}
.prod-info-val{color:var(--gray-800);font-weight:500;margin-right:8px;}
.prod-form{background:var(--gray-50);border-radius:var(--radius-sm);padding:10px;margin-top:8px;}
.prod-form-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px;}
.prod-form-row label{color:var(--gray-600);min-width:70px;}
.prod-form-row select,.prod-form-row input[type=text],.prod-form-row input[type=number]{font-size:13px;padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--white);color:var(--gray-800);}
.btn-save-prod{font-size:12px;padding:5px 14px;border-radius:var(--radius-sm);border:none;background:var(--brand);color:var(--white);cursor:pointer;font-weight:500;}
/* 出貨記錄 */
.ship-section{margin-top:10px;border-top:1px solid var(--gray-100);padding-top:10px;}
.ship-title{font-size:13px;font-weight:500;color:var(--gray-800);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.ship-progress{font-size:12px;color:var(--gray-400);}
.ship-progress.complete{color:var(--success);font-weight:600;}
.ship-log{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.ship-log-item{display:flex;align-items:center;gap:8px;font-size:12px;background:var(--gray-50);border-radius:var(--radius-sm);padding:5px 10px;}
.ship-log-date{color:var(--gray-600);min-width:90px;}
.ship-log-qty{font-weight:600;color:var(--success);}
.ship-add-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.ship-add-row input{font-size:13px;padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--white);color:var(--gray-800);}
.btn-ship{font-size:12px;padding:5px 14px;border-radius:var(--radius-sm);border:none;background:var(--success);color:var(--white);cursor:pointer;font-weight:500;}
.ship-bar{height:6px;background:var(--gray-200);border-radius:99px;margin-bottom:8px;overflow:hidden;}
.ship-bar-fill{height:100%;background:var(--success);border-radius:99px;transition:width .4s;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.modal-bg.open{display:flex;}
.modal{background:var(--white);border-radius:14px;padding:1.75rem;width:min(440px,100%);max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:1.25rem;color:var(--gray-800);}
.form-row{margin-bottom:.875rem;}
.form-label{font-size:13px;color:var(--gray-600);margin-bottom:4px;display:block;}
.form-input{width:100%;font-size:14px;padding:9px 11px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--gray-50);color:var(--gray-800);}
.form-input:focus{outline:none;border-color:var(--brand);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}
.btn-cancel{font-size:13px;padding:8px 18px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:transparent;color:var(--gray-600);cursor:pointer;}
.btn-save{font-size:13px;padding:8px 18px;border-radius:var(--radius-sm);border:none;background:var(--brand);color:var(--white);cursor:pointer;font-weight:500;}
.btn-save:hover{background:var(--brand-dark);}
.empty{padding:3rem;text-align:center;color:var(--gray-400);font-size:14px;}
@media(max-width:520px){.stats{grid-template-columns:repeat(2,minmax(0,1fr));}.order-name{display:none;}.topbar-name span{display:none;}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="https://raw.githubusercontent.com/mingchia7/hcpi-order-system/main/logo.png" style="width:120px;height:80px;object-fit:contain;" />
    </div>
    <div class="login-company">弘丞精密工業有限公司</div>
    <div class="login-title">HCPI 訂單系統</div>
    <div class="login-sub">僅限公司人員登入使用<br>請使用公司授權的 Google 帳號</div>
    <hr class="login-divider" />
    <div id="g_id_signin"></div>
    <div class="login-note">如無法登入，請聯繫管理員確認<br>您的帳號是否已取得存取權限</div>
  </div>
</div>

<div id="denied-screen">
  <div class="denied-icon">🔒</div>
  <div class="denied-title">無存取權限</div>
  <div class="denied-sub" id="denied-email"></div>
  <button class="btn-signout" onclick="signOut()">登出，換帳號試試</button>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <img src="https://raw.githubusercontent.com/mingchia7/hcpi-order-system/main/logo.png" style="width:36px;height:36px;object-fit:contain;" />
    </div>
    <div class="topbar-name">HCPI <span>訂單進度系統</span></div>
    <div class="user-avatar" id="user-avatar" title="登出" onclick="signOut()"></div>
  </div>
  <div class="main">
    <div class="stats" id="stats"></div>
    <div class="toolbar">
      <button class="chip active" onclick="setFilter('all',this)">全部</button>
      <button class="chip" onclick="setFilter('待入料',this)">待入料</button>
      <button class="chip" onclick="setFilter('入料中',this)">入料中</button>
      <button class="chip" onclick="setFilter('生產中',this)">生產中</button>
      <button class="chip" onclick="setFilter('生產完成',this)">生產完成</button>
      <button class="chip" onclick="setFilter('品檢中',this)">品檢中</button>
      <button class="chip" onclick="setFilter('完成',this)">完成</button>
      <button class="btn-add" onclick="openModal()">+ 新增訂單</button>
    </div>
    <div id="orders-container"></div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title">新增訂單</div>
    <div class="form-row"><label class="form-label">訂單編號</label><input class="form-input" id="f-id" placeholder="例：PO-2026-042" /></div>
    <div class="form-row"><label class="form-label">產品名稱／型號</label><input class="form-input" id="f-name" placeholder="例：鋁合金支架 A型" /></div>
    <div class="form-row"><label class="form-label">客戶名稱</label><input class="form-input" id="f-client" placeholder="例：台灣精機有限公司" /></div>
    <div class="form-row"><label class="form-label">交貨日期</label><input class="form-input" id="f-due" type="date" /></div>
    <div class="form-row"><label class="form-label">訂單總數量（pcs）</label><input class="form-input" id="f-totalqty" type="number" min="0" placeholder="0" /></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveOrder()">儲存訂單</button>
    </div>
  </div>
</div>

<script>
const ALLOWED_EMAILS = [
  'ming.chia7@gmail.com',
  'engineer@hcpi.com.tw',
];
const GOOGLE_CLIENT_ID = '383017876396-gb80d9p28n287f1iqi98o5mjjmr5sv8d.apps.googleusercontent.com';

const firebaseConfig = {
  apiKey: "AIzaSyBFbGFazvMc-S6jN-vyuSt6I6ryvjDIRhE",
  authDomain: "hcpi-order-system.firebaseapp.com",
  projectId: "hcpi-order-system",
  storageBucket: "hcpi-order-system.firebasestorage.app",
  messagingSenderId: "950890521894",
  appId: "1:950890521894:web:5580143e80b484570e4de7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const STAGES = ['待入料','入料中','生產中','生產完成','品檢中','完成'];
const PROG   = {'待入料':0,'入料中':20,'生產中':40,'生產完成':60,'品檢中':80,'完成':100};
const BADGE  = {'待入料':'b-wait','入料中':'b-mat','生產中':'b-prod','生產完成':'b-proddone','品檢中':'b-qc','完成':'b-done'};
const COLORS = {'待入料':'#B4B2A9','入料中':'#378ADD','生產中':'#EF9F27','生產完成':'#E65100','品檢中':'#7F77DD','完成':'#639922'};

const CLIENT_COLORS = [
  {bg:'#EDE9FD',dot:'#7C3AED',text:'#4C1D95'},
  {bg:'#E0F2FE',dot:'#0284C7',text:'#075985'},
  {bg:'#ECFDF5',dot:'#059669',text:'#065F46'},
  {bg:'#FFF7ED',dot:'#EA580C',text:'#9A3412'},
  {bg:'#FDF2F8',dot:'#C026D3',text:'#701A75'},
  {bg:'#F0FDF4',dot:'#16A34A',text:'#14532D'},
  {bg:'#FEF3C7',dot:'#D97706',text:'#92400E'},
  {bg:'#F1F5F9',dot:'#475569',text:'#1E293B'},
];

const MACHINES = {
  '一廠': Array.from({length:22},(_,i)=>`CNC車${i+1}`),
  '二廠': [...Array.from({length:14},(_,i)=>`CNC銑${i+1}`),...Array.from({length:16},(_,i)=>`CNC車${i+1}`)],
  '委外加工': ['CNC車','CNC銑']
};

const WORK_SECTIONS = ['車工1','車工2','車工3','車工4','車工5','銑工1','銑工2','銑工3','銑工4','銑工5'];

let orders=[], expanded=null, filter='all', clientColorMap={};

function getClientColor(client) {
  if (!clientColorMap[client]) {
    const idx = Object.keys(clientColorMap).length % CLIENT_COLORS.length;
    clientColorMap[client] = CLIENT_COLORS[idx];
  }
  return clientColorMap[client];
}

// ── Google Sign-In ──
function initGoogleLogin() {
  if (typeof google==='undefined') { setTimeout(initGoogleLogin,300); return; }
  google.accounts.id.initialize({ client_id:GOOGLE_CLIENT_ID, callback:handleCredential, auto_select:false, ux_mode:'popup' });
  google.accounts.id.renderButton(document.getElementById('g_id_signin'),{theme:'outline',size:'large',text:'signin_with',locale:'zh-TW',width:280});
  google.accounts.id.prompt();
}
window.addEventListener('load', initGoogleLogin);

function handleCredential(response) {
  const payload = parseJwt(response.credential);
  if (ALLOWED_EMAILS.includes(payload.email)) {
    showApp(payload);
  } else {
    document.getElementById('denied-email').textContent = payload.email+' 無權限存取此系統';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('denied-screen').style.display='flex';
  }
}
function showApp(payload) {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  const av=document.getElementById('user-avatar');
  if (payload.picture) av.innerHTML=`<img src="${payload.picture}" alt="avatar" />`;
  else av.textContent=(payload.name||payload.email)[0].toUpperCase();
  loadOrders();
}
function signOut() { google.accounts.id.disableAutoSelect(); location.reload(); }
function parseJwt(token) {
  const base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(atob(base64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
}

// ── Firebase ──
function loadOrders() {
  document.getElementById('orders-container').innerHTML='<div class="empty">載入中...</div>';
  db.collection('orders').orderBy('createdAt','desc').onSnapshot(snapshot => {
    orders = snapshot.docs.map(doc=>({docId:doc.id,...doc.data()}));
    clientColorMap={};
    [...new Set(orders.map(o=>o.client||'未指定'))].forEach(c=>getClientColor(c));
    renderStats(); renderOrders();
  });
}

function changeStage(id, stage) {
  const o=orders.find(o=>o.id===id);
  if (o) db.collection('orders').doc(o.docId).update({stage});
}
function updateStep(id, key, val) {
  const o=orders.find(o=>o.id===id);
  if (o) { expanded=id; db.collection('orders').doc(o.docId).update({[key]:val}); }
}
function saveProdLog(id) {
  const o=orders.find(o=>o.id===id); if (!o) return;
  const date=document.getElementById('prodlog-date-'+id)?.value;
  const loc=document.getElementById('prodlog-loc-'+id)?.value;
  const machine=document.getElementById('prodlog-machine-'+id)?.value||'';
  const section=document.getElementById('prodlog-section-'+id)?.value||'';
  const vendor=document.getElementById('prodlog-vendor-'+id)?.value||'';
  const qty=document.getElementById('prodlog-qty-'+id)?.value||'';
  if (!date||!loc) { alert('請填寫日期和生產地點'); return; }
  const logs=Array.isArray(o.prodLogs)?[...o.prodLogs]:[];
  logs.push({date,loc,machine,section,vendor,qty});
  db.collection('orders').doc(o.docId).update({prodLogs:logs});
  expanded=id;
}
function deleteProdLog(id, idx) {
  const o=orders.find(o=>o.id===id); if (!o) return;
  const logs=[...o.prodLogs]; logs.splice(idx,1);
  db.collection('orders').doc(o.docId).update({prodLogs:logs});
  expanded=id;
}
function updateProdLogLoc(id) {
  const loc=document.getElementById('prodlog-loc-'+id)?.value;
  const mr=document.getElementById('prodlog-machine-row-'+id);
  const sr=document.getElementById('prodlog-section-row-'+id);
  const vr=document.getElementById('prodlog-vendor-row-'+id);
  const ms=document.getElementById('prodlog-machine-'+id);
  if (loc==='一廠'||loc==='二廠') {
    mr.style.display='flex'; sr.style.display='flex'; vr.style.display='none';
    ms.innerHTML='<option value="">請選擇機台</option>'+MACHINES[loc].map(m=>`<option value="${m}">${m}</option>`).join('');
  } else if (loc==='委外加工') {
    mr.style.display='flex'; sr.style.display='none'; vr.style.display='flex';
    ms.innerHTML='<option value="">請選擇加工類型</option>'+MACHINES['委外加工'].map(m=>`<option value="${m}">${m}</option>`).join('');
  } else { mr.style.display='none'; sr.style.display='none'; vr.style.display='none'; }
}

// ── 分批出貨 ──
function addShipment(id) {
  const o=orders.find(o=>o.id===id); if (!o) return;
  const date=document.getElementById('ship-date-'+id)?.value;
  const qty=parseInt(document.getElementById('ship-qty-'+id)?.value)||0;
  const defect=parseInt(document.getElementById('ship-defect-'+id)?.value)||0;
  if (!date||qty<=0) { alert('請填寫出貨日期和出貨數量'); return; }
  const logs=Array.isArray(o.shipLogs)?[...o.shipLogs]:[];
  logs.push({date,qty,defect});
  const shipped=logs.reduce((s,l)=>s+parseInt(l.qty||0),0);
  const defects=logs.reduce((s,l)=>s+parseInt(l.defect||0),0);
  const total=parseInt(o.totalQty)||0;
  const newStage=(total>0&&(shipped+defects)>=total)?'完成':o.stage;
  const defectRate=newStage==='完成'&&total>0?(defects/total*100).toFixed(1):'';
  db.collection('orders').doc(o.docId).update({shipLogs:logs,stage:newStage,defectRate});
  expanded=id;
}
function deleteShipment(id, idx) {
  const o=orders.find(o=>o.id===id); if (!o) return;
  const logs=[...o.shipLogs];
  logs.splice(idx,1);
  const shipped=logs.reduce((s,l)=>s+parseInt(l.qty||0),0);
  const defects=logs.reduce((s,l)=>s+parseInt(l.defect||0),0);
  const total=parseInt(o.totalQty)||0;
  const newStage=(total>0&&(shipped+defects)>=total)?'完成':(o.stage==='完成'?'品檢中':o.stage);
  const defectRate=newStage==='完成'&&total>0?(defects/total*100).toFixed(1):'';
  db.collection('orders').doc(o.docId).update({shipLogs:logs,stage:newStage,defectRate});
  expanded=id;
}

function saveOrder() {
  const id=document.getElementById('f-id').value.trim();
  const name=document.getElementById('f-name').value.trim();
  const client=document.getElementById('f-client').value.trim();
  const due=document.getElementById('f-due').value;
  const totalQty=document.getElementById('f-totalqty').value;
  if (!id||!name||!due) { alert('請填寫訂單編號、產品名稱及交貨日期'); return; }
  db.collection('orders').add({
    id,name,client,due,totalQty:parseInt(totalQty)||0,
    stage:'待入料',
    mat:'',matQty:'',prodStart:'',prod:'',
    prodLocation:'',prodMachine:'',prodVendor:'',prodQty:'',
    qc:'',shipLogs:[],
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  });
  closeModal();
  ['f-id','f-name','f-client','f-due','f-totalqty'].forEach(f=>document.getElementById(f).value='');
}

// ── Render ──
function renderStats() {
  const now=new Date(), week=new Date(now.getTime()+7*86400000);
  const active=orders.filter(o=>o.stage!=='完成').length;
  const urgent=orders.filter(o=>{const d=new Date(o.due);return d>=now&&d<=week&&o.stage!=='完成';}).length;
  const overdue=orders.filter(o=>o.stage!=='完成'&&new Date(o.due)<now).length;
  document.getElementById('stats').innerHTML=[
    ['全部訂單',orders.length,''],['進行中',active,'c-brand'],
    ['本週到期',urgent,urgent>0?'c-brand':''],['逾期未完成',overdue,''],
  ].map(([l,n,cls])=>`<div class="stat"><div class="stat-label">${l}</div><div class="stat-num ${cls}">${n}</div></div>`).join('');
}

function renderOrders() {
  const list=filter==='all'?orders:orders.filter(o=>o.stage===filter);
  const container=document.getElementById('orders-container');
  if (!list.length) { container.innerHTML='<div class="empty">沒有符合條件的訂單</div>'; return; }
  const groups={};
  list.forEach(o=>{ const c=o.client||'未指定客戶'; if(!groups[c]) groups[c]=[]; groups[c].push(o); });
  container.innerHTML=Object.entries(groups).map(([client,clientOrders])=>{
    const color=getClientColor(client);
    return `<div class="client-group">
      <div class="client-group-header" style="background:${color.bg};color:${color.text};">
        <div class="client-dot" style="background:${color.dot};"></div>
        ${client} <span style="font-weight:400;font-size:12px;margin-left:4px;">${clientOrders.length} 張訂單</span>
      </div>
      <div class="orders">${clientOrders.map(o=>renderOrderCard(o)).join('')}</div>
    </div>`;
  }).join('');
}

function renderOrderCard(o) {
  const over=o.stage!=='完成'&&new Date(o.due)<new Date();
  const pct=PROG[o.stage]||0;
  const isExp=expanded===o.id;
  const stageIdx=STAGES.indexOf(o.stage);
  const total=parseInt(o.totalQty)||0;
  const logs=Array.isArray(o.shipLogs)?o.shipLogs:[];
  const shipped=logs.reduce((s,l)=>s+parseInt(l.qty||0),0);
  const defects=logs.reduce((s,l)=>s+parseInt(l.defect||0),0);

  // 步驟
  const steps=[
    {key:'mat',label:'入料到廠',activeStage:'入料中',hasQty:true,qtyKey:'matQty',qtyLabel:'入料數量'},
    {key:'prodStart',label:'生產開始',activeStage:'生產中',hasQty:false},
    {key:'prod',label:'生產完成',activeStage:'生產完成',hasQty:false},
    {key:'qc',label:'品檢通過',activeStage:'品檢中',hasQty:false},
  ];

  const stepsHtml=steps.map(s=>{
    const done=o[s.key]&&o[s.key]!=='';
    const active=!done&&o.stage===s.activeStage;
    return `<div class="step">
      <div class="step-dot ${done?'done':active?'active':''}">
        ${done?`<svg viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
      </div>
      <div class="step-line"></div>
      <div style="flex:1;">
        <div class="step-label">${s.label}</div>
        ${done
          ? `<div class="step-meta">完成於 ${o[s.key]}${s.hasQty&&o[s.qtyKey]?' ・ '+o[s.qtyKey]+' pcs':''}</div>`
          : `<div class="step-inputs">
              <input class="step-input" type="date" onchange="updateStep('${o.id}','${s.key}',this.value)" />
              ${s.hasQty?`<input class="step-input qty-input" type="number" min="0" placeholder="${s.qtyLabel}" onchange="updateStep('${o.id}','${s.qtyKey}',this.value)" /><span style="font-size:12px;color:var(--gray-400);">pcs</span>`:''}
            </div>`}
      </div>
    </div>`;
  }).join('');

  // 多筆生產紀錄
  const prodLogs=Array.isArray(o.prodLogs)?o.prodLogs:[];
  const prodInfoHtml=(o.stage==='生產中'||o.stage==='生產完成')?`
    <div class="ship-section">
      <div class="ship-title">生產紀錄
        <span style="font-size:12px;color:var(--gray-400);font-weight:400;">共 ${prodLogs.length} 筆</span>
      </div>
      ${prodLogs.length?`<div class="ship-log">
        ${prodLogs.map((l,i)=>`<div class="ship-log-item" style="flex-wrap:wrap;gap:6px;">
          <span class="ship-log-date">${l.date}</span>
          <span style="font-size:12px;font-weight:500;color:var(--brand);">${l.loc}</span>
          ${l.machine?`<span style="font-size:12px;color:var(--gray-600);">${l.machine}</span>`:''}
          ${l.section?`<span style="font-size:12px;background:var(--purple-bg);color:var(--purple);padding:1px 7px;border-radius:99px;">${l.section}</span>`:''}
          ${l.vendor?`<span style="font-size:12px;color:var(--gray-600);">廠商：${l.vendor}</span>`:''}
          ${l.qty?`<span class="ship-log-qty">${l.qty} pcs</span>`:''}
          <button onclick="deleteProdLog('${o.id}',${i})" style="margin-left:auto;font-size:11px;padding:2px 8px;border-radius:99px;border:1px solid var(--gray-200);background:transparent;color:var(--gray-400);cursor:pointer;">刪除</button>
        </div>`).join('')}
      </div>`:''}
      <div class="prod-form" style="margin-top:8px;">
        <div class="prod-form-row">
          <label>日期：</label>
          <input type="date" id="prodlog-date-${o.id}" style="font-size:13px;padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--white);color:var(--gray-800);" />
        </div>
        <div class="prod-form-row">
          <label>生產地點：</label>
          <select id="prodlog-loc-${o.id}" onchange="updateProdLogLoc('${o.id}')">
            <option value="">請選擇</option>
            <option value="一廠">一廠</option>
            <option value="二廠">二廠</option>
            <option value="委外加工">委外加工</option>
          </select>
        </div>
        <div id="prodlog-machine-row-${o.id}" style="display:none;" class="prod-form-row">
          <label>機台：</label>
          <select id="prodlog-machine-${o.id}"><option value="">請選擇</option></select>
        </div>
        <div id="prodlog-section-row-${o.id}" style="display:none;" class="prod-form-row">
          <label>工段：</label>
          <select id="prodlog-section-${o.id}">
            <option value="">請選擇工段</option>
            ${WORK_SECTIONS.map(s=>`<option value="${s}">${s}</option>`).join('')}
          </select>
        </div>
        <div id="prodlog-vendor-row-${o.id}" style="display:none;" class="prod-form-row">
          <label>委外廠商：</label>
          <input type="text" id="prodlog-vendor-${o.id}" placeholder="廠商名稱" style="font-size:13px;padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--white);color:var(--gray-800);" />
        </div>
        <div class="prod-form-row">
          <label>生產數量：</label>
          <input type="number" id="prodlog-qty-${o.id}" placeholder="0" min="0" style="width:80px;font-size:13px;padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:var(--white);color:var(--gray-800);" />
          <span style="font-size:12px;color:var(--gray-400);">pcs</span>
          <button class="btn-save-prod" onclick="saveProdLog('${o.id}')">+ 新增生產</button>
        </div>
      </div>
    </div>`:'';

  // 總工時計算（生產開始→生產完成）
  let workDays = '';
  if (o.prodStart && o.prod) {
    const d1=new Date(o.prodStart), d2=new Date(o.prod);
    const diff=Math.round((d2-d1)/(1000*60*60*24));
    if (diff>=0) workDays=diff;
  }

  // 分批出貨
  const shipPct=total>0?Math.min(100,Math.round((shipped+defects)/total*100)):0;
  const shipDone=total>0&&(shipped+defects)>=total;
  const shipHtml=`
    <div class="ship-section">
      <div class="ship-title">
        出貨紀錄
        <span class="ship-progress ${shipDone?'complete':''}">
          ${total>0?`出貨 ${shipped} + 不良 ${defects} = ${shipped+defects} / ${total} pcs (${shipPct}%)`:'尚未設定總數量'}
        </span>
      </div>
      ${total>0?`<div class="ship-bar"><div class="ship-bar-fill" style="width:${shipPct}%;"></div></div>`:''}
      ${logs.length?`<div class="ship-log">
        ${logs.map((l,i)=>`<div class="ship-log-item">
          <span class="ship-log-date">${l.date}</span>
          <span class="ship-log-qty">出貨 +${l.qty} pcs</span>
          ${parseInt(l.defect||0)>0?`<span style="font-size:12px;color:var(--danger);font-weight:500;">不良 ${l.defect} pcs</span>`:''}
          <button onclick="deleteShipment('${o.id}',${i})" style="margin-left:auto;font-size:11px;padding:2px 8px;border-radius:99px;border:1px solid var(--gray-200);background:transparent;color:var(--gray-400);cursor:pointer;">刪除</button>
        </div>`).join('')}
      </div>`:''}
      ${shipDone?`
        <div style="background:var(--success-bg);border-radius:var(--radius-sm);padding:10px 14px;margin-top:8px;">
          <div style="font-size:13px;color:var(--success);font-weight:600;margin-bottom:4px;">✓ 已全數出貨完成</div>
          <div style="display:flex;gap:20px;flex-wrap:wrap;">
            <div style="font-size:12px;color:var(--gray-600);">不良率：<strong style="color:${parseFloat(o.defectRate||0)>5?'var(--danger)':'var(--success)'};">${o.defectRate||'0'}%</strong></div>
            ${workDays!==''?`<div style="font-size:12px;color:var(--gray-600);">生產工時：<strong style="color:var(--info);">${workDays} 天</strong></div>`:''}
          </div>
        </div>`:`
        <div class="ship-add-row">
          <input type="date" id="ship-date-${o.id}" class="step-input" />
          <input type="number" id="ship-qty-${o.id}" class="step-input qty-input" min="1" placeholder="出貨數量" />
          <input type="number" id="ship-defect-${o.id}" class="step-input qty-input" min="0" placeholder="不良品" style="border-color:#FECACA;" />
          <span style="font-size:12px;color:var(--gray-400);">pcs</span>
          <button class="btn-ship" onclick="addShipment('${o.id}')">+ 新增出貨</button>
        </div>`}
    </div>`;

  return `<div class="order-card ${isExp?'expanded':''}">
    <div class="order-top" onclick="toggleExpand('${o.id}')">
      <span class="order-id">${o.id}</span>
      <span class="order-name">${o.name}</span>
      ${total>0?`<span class="order-qty-tag">${total} pcs</span>`:''}
      <span class="badge ${BADGE[o.stage]||'b-wait'}">${o.stage}</span>
      <span class="due-tag ${over?'overdue':''}">${over?'⚠ ':''}交期 ${o.due}</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${COLORS[o.stage]||'#B4B2A9'};"></div></div>
    <div class="order-detail ${isExp?'open':''}">
      <div class="steps">${stepsHtml}</div>
      ${prodInfoHtml}
      ${shipHtml}
      <div class="stage-btns" style="margin-top:10px;">
        ${STAGES.map(s=>`<button class="stage-btn ${o.stage===s?'active':''}" onclick="changeStage('${o.id}','${s}')">${s}</button>`).join('')}
      </div>
    </div>
  </div>`;
}

function toggleExpand(id){expanded=expanded===id?null:id;renderOrders();}
function setFilter(f,btn){filter=f;document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderOrders();}
function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
</script>
</body>
</html>
